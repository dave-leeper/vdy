<custom-component>
    <script>
        //# sourceURL=html/components/reservations/location.html
        class Location extends Component {
            airport() {
                const airport = document.getElementById(`${this.id}AirportWrapper`)
                const address = document.getElementById(`${this.id}AddressWrapper`)

                if (airport.classList.contains(`display-none`)) { airport.classList.remove(`display-none`) }
                if (!address.classList.contains(`display-none`)) { address.classList.add(`display-none`) }
            }
            address() {
                const airport = document.getElementById(`${this.id}AirportWrapper`)
                const address = document.getElementById(`${this.id}AddressWrapper`)

                if (!airport.classList.contains(`display-none`)) { airport.classList.add(`display-none`) }
                if (address.classList.contains(`display-none`)) { address.classList.remove(`display-none`) }
            }
            props = {
                title: `Pickup`
            }
        }
    </script>
    <test-script>
    </test-script>
    <style>
    </style>
    <component-markup>
        <div id="{id}" class="flex-col margin-10 shadow-white round-15px pad-b-10 w50">
            <h2 id="{id}Title" class="header-6 margin-l-5 margin-b-5">{title}</h2>
            <div id="{id}Location" class="flex-row">
                <div id="{id}Airport" onclick="$obj.airport()">
                    <include-html include-in="reservations.html" src="./html/components/radio-button.html" component-class="RadioButton" component-id="{id}Airport" checked="checked">
                        <include-props class="display-none">{ label: `Airport`, name: `{title}location`, tabindex: 4 }</include-props>
                    </include-html>
                </div>
                <div class="margin-lr-10"></div>
                <div id="{id}Address" onclick="$obj.address()">
                    <include-html include-in="reservations.html" src="./html/components/radio-button.html" component-class="RadioButton" component-id="{id}Address">
                        <include-props class="display-none">{ label: `Address`, name: `{title}location`, tabindex: 5 }</include-props>
                    </include-html>
                </div>
            </div>
            <div class="margin-10">
                <div id="{id}AirportWrapper">
                    <include-html include-in="reservations.html" src="./html/components/reservations/airport.html" component-class="Airport" component-id="{id}AirportInfo">
                    </include-html>
                </div>
                <div id="{id}AddressWrapper" class="display-none">
                    <include-html include-in="reservations.html" src="./html/components/reservations/address.html" component-class="Address" component-id="{id}AddressInfo">
                    </include-html>
                </div>
            </div>
        </div>
    </component-markup>
</custom-component>
