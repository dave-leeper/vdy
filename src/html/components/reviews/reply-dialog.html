<vanilla-component>
    <script>
        class ReplyDialog{
            className() {return this.constructor.name }
            initialize(componentObjectId) { 
                const reviewObj = Vanilla.getComponentObject(`Review-${this.props.reviewId}`)

                this.props.componentObjectId = componentObjectId 
                this.vars.reviewImageURL = reviewObj.props.imageURL
                this.vars.reviewFirstName = reviewObj.props.firstName
                this.vars.reviewLastName = reviewObj.props.lastName
                this.vars.reviewCity = reviewObj.props.city
                this.vars.reviewState = reviewObj.props.state
                this.vars.reviewDate = reviewObj.props.date
                this.vars.reviewRating = reviewObj.props.rating
                this.vars.review = reviewObj.props.review

                this.vars.editingExistingReply = false
                if (this.props.replyId && this.props.replyId !== `undefined`) {
                    const replyObj = Vanilla.getComponentObject(`Reply-${this.props.replyId}`)

                    this.vars.reply = replyObj.vars.reply
                    this.vars.editingExistingReply = true
                }
            }
            beforeMount() { }
            afterMount() { }
            beforeUnmount() { }
            afterUnmount() { }
            onBlur(event) {
                this.updateReply()
            }
            onInput(event) {
                this.updateReply()
            }
            updateReply() {
                const textAreaId = `${this.props.componentObjectId}-reply-text`
                let textarea = document.getElementById(textAreaId)

                this.vars.reply = textarea.value
                console.log(this.vars.reply)
            }
            show() {
                const modal = document.getElementById(this.props.componentObjectId)

                modal.setAttribute(`class`, `display-block modal`)
            }
            async hide() {
                const modal = document.getElementById(this.props.componentObjectId)

                modal.setAttribute(`class`, `display-none modal`)
                await VanillaComponentLifecycle.unmount(`${this.props.componentObjectId}-review-header-avatar`)
                await VanillaComponentLifecycle.unregisterComponentObject(`${this.props.componentObjectId}-review-header-avatar`)
                await VanillaComponentLifecycle.unmount(`${this.props.componentObjectId}-review-header`)
                await VanillaComponentLifecycle.unregisterComponentObject(`${this.props.componentObjectId}-review-header`)
                await VanillaComponentLifecycle.unmount(`${this.props.componentObjectId}-stars`)
                await VanillaComponentLifecycle.unregisterComponentObject(`${this.props.componentObjectId}-stars`)
                await VanillaComponentLifecycle.unmount(this.props.componentObjectId)
                await VanillaComponentLifecycle.unregisterComponentObject(this.props.componentObjectId)
                await VanillaComponentLifecycle.unregisterDOMFragment(this.className())
            }
            save() {
                console.log(`Saving`)
                VanillaJWT.getCredentials(async (error, credentials) => {
                    if (error) {
                        console.log(`Error getting credentials`)
                        // TODO: Display error message.
                        return
                    }
                    console.log(`credentials ${JSON.stringify(credentials)}`)
                    console.log(`this.vars.editingExistingReply ${this.vars.editingExistingReply}`)

                    if (this.vars.editingExistingReply) {

                    } else {
                        console.log(`Adding reply`)
                        const reviewNumber = this.props.reviewId.split(`:`)[1]
                        const reply = {
                            replyingTo: reviewNumber,
                            image: credentials.data.image,
                            name: {
                                first: credentials.data.name.first,
                                last: credentials.data.name.last
                            },
                            title: `Business Owner`,
                            reply: this.vars.reply
                        }
                        console.log(`Reply: ${JSON.stringify(reply)}`)
                        const response = await fetch('http://localhost:8080/add-replay', {
                            method: 'POST',
                            headers: {
                                'Accept': 'application/json',
                                'Content-Type': 'application/json',
                                'Authorization': `'Bearer ${credentials.data.token}'`
                            },
                            body: JSON.stringify(reply)
                        });
                        const content = await response.json()
                        console.log(`Response: ${JSON.stringify(content)}`)
                        if (200 === response.status) {
                            console.log(`Success`)
                            // TODO: Show success message
                            // TODO: Update credentials
                        } else {
                            console.log(`Error ${response.status}`)
                           // TODO: Show error message
                            // TODO: Remove credentials if status is unauthorized
                        }
                    }

                })
                this.hide()
            }
            props = {
                componentObjectId: ``,
                reviewId: ``,
                replyId: ``
            }
            vars = {
                reviewImageURL: ``,
                reviewFirstName: ``,
                reviewLastName: ``,
                reviewCity: ``,
                reviewState: `AZ`,
                reviewDate: ``,
                review: ` `,
                reviewRating: 0,
                reply: ` `,
                editingExistingReply: false
            }
        }
    </script>
    <test-script>
    </test-script>
    <style>

    </style>
    <component-markup>
        <div id="{componentObjectId}" class="modal display-none" onclick="$obj.hide()">
              <div id="{componentObjectId}-frame" class="modal-content" onclick="event.stopPropagation()">
                <include-html include-in="review-dialog.html" src="./html/components/reviews/review-header.html" component-class="ReviewHeader" component-id="{componentObjectId}-review-header">
                    <include-props class="display-none">
                        { 
                            imageURL: `{reviewImageURL}`,
                            firstName: `{reviewFirstName}`,
                            lastName: `{reviewLastName}`,
                            city: `{reviewCity}`,
                            state: `{reviewState}`,
                            date: `{reviewDate}`
                        }          
                    </include-props>
                </include-html>
                <include-html include-in="review-dialog.html" src="./html/components/reviews/stars.html" component-class="Stars" component-id="{componentObjectId}-stars">
                    <include-props class="display-none">{ editable: false }</include-props>
                    <include-vars class="display-none">{ rating: {reviewRating} }</include-vars>
                </include-html>
                <div class="flex-col margin-b-10">
                    <h3 id="{componentObjectId}-review-title" class="subtitle-2">Review</h3>
                    <p id="{componentObjectId}-review" class="caption-1 whitespace-pre-wrap">{review}</p>
                </div>
                <div class="flex-col margin-b-5">
                    <h3 id="{componentObjectId}-reply-title" class="subtitle-2">Reply</h3>
                    <textarea id="{componentObjectId}-reply-text" name="reply" class="w100 h200px left-align-text whitespace-pre-wrap caption-1" autofocus onblur="$obj.onBlur(event)" oninput="$obj.onInput(event)">{reply}</textarea>
                </div>
                <div id="{componentObjectId}" class="flex-row flex-wrap flex-end margin-t-10">
                    <div id="{componentObjectId}-cancel-button" class="button" onclick="$obj.hide()">
                        <div id="{componentObjectId}-cancel-button-text" class="margin-1">Cancel</div> 
                    </div>
                    <div id="{componentObjectId}-save-button" class="button" onclick="$obj.save()">
                        <div id="{componentObjectId}-save-button-text" class="margin-1">Save</div> 
                    </div>
                </div>    
            </div>
          </div>
    </component-markup>
</vanilla-component>
