<vanilla-component>
    <script>
        //# sourceURL=html/components/reviews/Reply.js
        class Reply extends Component {
            afterMount() { 
                JavascriptWebToken.getCredentials(async (error, credentials) => {
                    if (error) { return }
                    
                    const replyElement = document.getElementById(`${this.id}EditButton`)

                    if (!credentials?.roles) { return }
                    if (!credentials.roles.includes("Admin")) { return }
                    if (!replyElement) { return }

                    replyElement.setAttribute(`class`, `text-button`)
                })
            }
            destroy() {
                const replyHeaderObj = Component.getComponentObject(`${this.id}ReplyHeader`)

                replyHeaderObj.destroy()
                ComponentLifecycle.destroyComponentObject(`${this.id}`)
            }
            getReviewElement() {
                return document.getElementById(`Review${this.props.reviewId}`)
            }
            getReviewObject() {
                return Component.getComponentObject(`Review${this.props.reviewId}`)
            }
            getReplyElement() {
                return document.getElementById(`Reply${this.props.replyId}`)
            }
            async edit() { 
                const reviewObject = this.getReviewObject()
                const replyComponentObjectId = `Review${this.props.reviewId}`
                let propsInnerText = "{ reviewId: `" + this.props.reviewId + "`, replyId: `" + this.props.replyId + "` }"

                if (!document.getElementById(`ReplyDialog`)) {
                    let newInclude = Component.createComponentInclude(`index.html`, `./html/components/reviews/reply-dialog.html`, `ReplyDialog`,  `ReplyDialog`, propsInnerText, null)

                    this.getReviewElement().appendChild(newInclude)
                    await Loader.loadIncludes()
                }

                const replyDialog = Component.getComponentObject(`ReplyDialog`)

                replyDialog.show()
            }
            showError(message) {
                let errorSnackbar = Component.getComponentObject(`SnackbarError`)
                        
                errorSnackbar.vars.text = message
                errorSnackbar.show()
            }
            props = {
                reviewId: ``,
                replyId: ``,
                imageURL: ``,
                firstName: ``,
                lastName: ``,
                title: ``
            }
            vars = {
                reply: ``,
            }
        }
    </script>
    <test-script>
    </test-script>
    <style>
    </style>
    <component-markup>
        <section id="{id}" class="flex-col shadow-white round-15px pad-5 margin-b-10 margin-l-20 bg-blue-50">
            <div>
                <include-html include-in="reply.html" src="./html/components/reviews/reply-header.html" component-class="ReplyHeader" component-id="{id}ReplyHeader">
                    <include-props class="display-none">
                        { 
                            imageURL: `{imageURL}`,
                            firstName: `{firstName}`,
                            lastName: `{lastName}`,
                            title: `{title}`,
                            date: `{date}`
                        }          
                    </include-props>
                </include-html>
            </div>
            <section id="{id}ReplyBody" class="flex-col w100">
                <div id="{id}Reply" class="whitespace-pre-wrap overflow-wrap-break border-tb-solid border-1 border-gray-7 pad-5 text-2 cursor-default">{reply}</div>
            </section>
            <div id="{id}EditButton" class="display-none" onclick="$obj.edit()">
                <div id="{id}EditButtonText" class="margin-1">Edit</div> 
            </div>
        </section>
    </component-markup>
</vanilla-component>
