<vanilla-component>
    <script>
        class Reply{
            className() {return this.constructor.name }
            initialize(componentObjectId) { this.props.componentObjectId = componentObjectId }
            beforeMount() { }
            afterMount() { 
                const jwt = Registry.get(`JWT`)
                const replyElement = document.getElementById(`${this.props.componentObjectId}-edit`)

                if (!jwt?.roles) { return }
                if (!jwt.roles.includes("Admin")) { return }
                if (!replyElement) { return }
                replyElement.setAttribute(`class`, `text-button`)
            }
            beforeUnmount() { }
            afterUnmount() { }
            getReviewElement() {
                return document.getElementById(`Review-${this.props.reviewId}`)
            }
            getReplyElement() {
                return document.getElementById(`Reply-${this.props.replyId}`)
            }
            edit() { alert(`edit`) }
            props = {
                componentObjectId: ``,
                reviewId: ``,
                replyId: ``,
                imageURL: ``,
                firstName: ``,
                lastName: ``,
                title: ``,
                reply: `Thanks`,
            }
        }
    </script>
    <test-script>
    </test-script>
    <style>
    </style>
    <component-markup>
        newInclude.setAttribute(`data-id`, `${reply.id}`)
        newInclude.setAttribute(`data-reply-to-id`, `${review.id}`)
        <section id="{componentObjectId}" class="flex-col shadow-white round-15px pad-5 margin-b-10 margin-l-20 bg-blue-50">
            <div>
                <include-html include-in="reply.html" src="./html/components/reviews/reply-header.html" component-class="ReplyHeader" component-id="{componentObjectId}-reply-header">
                    <include-props class="display-none">
                        { 
                            imageURL: `{imageURL}`,
                            firstName: `{firstName}`,
                            lastName: `{lastName}`,
                            title: `{title}`,
                            date: `{date}`
                        }          
                    </include-props>
                </include-html>
            </div>
            <section id="{componentObjectId}-reply-body" class="flex-col w100">
                <div id="{componentObjectId}-reply" class="whitespace-pre-wrap overflow-wrap-break border-tb-solid border-1 border-gray-7 pad-5 text-2">{reply}</div>
            </section>
            <div id="{componentObjectId}-edit" class="display-none" onclick="$obj.edit()">
                <div id="{componentObjectId}-edit-buttom" class="margin-1">Edit</div> 
            </div>
        </section>
    </component-markup>
</vanilla-component>
