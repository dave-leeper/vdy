<vanilla-component>
    <script>
        //# sourceURL=html/components/reviews/ReviewDialog.js
        class ReviewDialog extends Component {
            afterMount() {
                const element = document.getElementById(this.id)

                element.addEventListener(`newTextData`, (e) => { 
                    if (`FirstName` === e.detail.component.props.name) {
                        this.vars.reviewFirstName = e.detail.text()
                    } else if (`LastName` === e.detail.component.props.name) {
                        this.vars.reviewLastName = e.detail.text()
                    } else if (`City` === e.detail.component.props.name) {
                        this.vars.reviewCity = e.detail.text()
                    } else if (`State` === e.detail.component.props.name) {
                        this.vars.reviewState = e.detail.text()
                    } else if (`AvatarURL` === e.detail.component.props.name) {
                        this.vars.reviewImageURL = e.detail.text()
                    }
                })
                element.addEventListener(`newRating`, (e) => { this.vars.reviewRating = e.detail.rating })
            }
            destroy() {
                const reviewHeaderObj = Component.getObject(`${this.id}ReviewHeader`)
                const starsObj = Component.getObject(`${this.id}Stars`)

                reviewHeaderObj.destroy()
                starsObj.destroy()
                ComponentLifecycle.destroyComponentObject(`${this.id}`)
            }
            onBlur(event) { this.updateReview() }
            onInput(event) { this.updateReview() }
            updateReview() {
                const textAreaId = `${this.id}ReviewText`
                let textarea = document.getElementById(textAreaId)

                this.vars.review = textarea.value
            }
            show() {
                const modal = document.getElementById(this.id)

                modal.setAttribute(`class`, `display-block modal`)
            }
            hide() {
                const modal = document.getElementById(this.id)

                modal.setAttribute(`class`, `display-none modal`)
                this.destroy()
            }
            showError(message) {
                let errorSnackbar = Component.getObject(`SnackbarError`)
                        
                errorSnackbar.vars.text = message
                errorSnackbar.show()
            }
            showInfo(message) {
                let infoSnackbar = Component.getObject(`SnackbarInfo`)
                        
                infoSnackbar.vars.text = message
                infoSnackbar.show()
            }
            async save() {
                const review = {
                    image: DOMPurify.sanitize(this.vars.reviewImageURL),
                    name: {
                        first: DOMPurify.sanitize(this.vars.reviewFirstName),
                        last: DOMPurify.sanitize(this.vars.reviewLastName)
                    },
                    city: DOMPurify.sanitize(this.vars.reviewCity),
                    state: DOMPurify.sanitize(this.vars.reviewState),
                    date: this.vars.reviewDate,
                    review: DOMPurify.sanitize(this.vars.review.trim()),
                    stars: this.vars.reviewRating,
                    usefulCount: 0,
                    funnyCount: 0,
                    coolCount: 0
                }
                const response = await fetch('http://localhost:8080/add-review', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(review)
                })

                if (200 === response.status) {
                    const content = await response.json()
                    const reviewList = Component.getObject(`ReviewList`)

                    reviewList.destroyReviewsAndReplies()
                    reviewList.fetchReviews()
                    JavascriptWebToken.storeCredentials(content.jwt)
                    this.showInfo(`Review added.`)
                } else {
                    this.showError(`Error adding review. Status code ${response.status}.`)
                }
                this.hide()
            }
            vars = {
                reviewImageURL: `./images/generic-avatar.png`,
                reviewFirstName: ``,
                reviewLastName: ``,
                reviewCity: ``,
                reviewState: ``,
                reviewDate: ``,
                review: ` `,
                reviewRating: 5,
            }
        }
    </script>
    <test-script>
    </test-script>
    <style>

    </style>
    <component-markup>
        <div id="{id}" class="modal display-none" onclick="$obj.hide()">
              <div id="{id}Frame" class="modal-content h525px" onclick="event.stopPropagation()">
                <div class="h160px">
                    <include-html include-in="review-dialog.html" src="./html/components/reviews/stars.html" component-class="Stars" component-id="{id}Stars">
                        <include-props class="display-none">{ editable: true }</include-props>
                        <include-vars class="display-none">{ rating: {reviewRating} }</include-vars>
                    </include-html>
                    <include-html include-in="review-dialog.html" src="./html/components/reviews/review-header-editable.html" component-class="ReviewHeaderEditable" component-id="{id}ReviewHeader">
                        <include-vars class="display-none">
                            { 
                                imageURL: `{reviewImageURL}`,
                                firstName: `{reviewFirstName}`,
                                lastName: `{reviewLastName}`,
                                city: `{reviewCity}`,
                                state: `{reviewState}`,
                                date: `{reviewDate}`
                            }          
                        </include-vars>
                    </include-html>
                </div>
                <div class="flex-col margin-b-5 margin-t-20">
                    <h3 id="{id}ReviewTitle" class="subtitle-2">Review</h3>
                    <textarea id="{id}ReviewText" name="review" class="w100 h240px left-align-text whitespace-pre-wrap caption-1" onblur="$obj.onBlur(event)" oninput="$obj.onInput(event)" tabindex="6">{review}</textarea>
                </div>
                <div id="{id}Buttons" class="flex-row flex-wrap flex-end margin-t-10">
                    <div id="{id}CancelButton" class="button" onclick="$obj.hide()">
                        <div id="{id}CancelButtonText" class="margin-1">Cancel</div> 
                    </div>
                    <div id="{id}SaveButton" class="button" onclick="$obj.save()">
                        <div id="{id}SaveButtonText" class="margin-1">Save</div> 
                    </div>
                </div>    
            </div>
          </div>
    </component-markup>
</vanilla-component>
