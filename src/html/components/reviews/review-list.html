<vanilla-component>
    <script>
        class ReviewList{
            className() {return this.constructor.name }
            initialize(componentObjectId) { 
                this.props.componentObjectId = componentObjectId
                fetch(this.props.fetchURL)
                    .then((response) => response.json())
                    .then((data) => {
                        let reviews = this.sortReviews(data)
                        let reviewsAndReplies = this.pairReviewsAndReplies(reviews)
                        let newDOMElements = this.createListElements(reviewsAndReplies)

                        this.vars.reviews = reviewsAndReplies
                        this.buildListElements(newDOMElements)
                        this.vars.loadingClass = `display-none`
                    })
            }
            beforeMount() { }
            afterMount() { }
            beforeUnmount() { }
            afterUnmount() { }
            sortReviews(data) {
                const sortFunction = (a, b) => {
                    const dateA = a.date.split("/")
                    const dateB = b.date.split("/")

                    if (dateA[2] !== dateB[2]) { return dateB[2] - dateA[2] }
                    if (dateA[0] !== dateB[0]) { return dateB[0] - dateA[0] }
                    return dateB[1] - dateA[1]
                }
                data.sort(sortFunction)
                return data
            }
            isReply(data) { return !!data.replyingTo }
            pairReviewsAndReplies(data) {
                let result = []

                for (const reviewOrReply of data) {
                    let review = null
                    let reply = null

                    if (this.isReply(reviewOrReply)) { continue }
                    review = reviewOrReply
                    for (const reviewOrReply2 of data) {
                        if (reviewOrReply === reviewOrReply2) { continue }
                        if (!this.isReply(reviewOrReply2)) { continue }

                        const reviewId = review.id.split(`:`)[1]

                        if (reviewId !== reviewOrReply2.replyingTo.toString()) { continue }
                        reply = reviewOrReply2
                        break
                    }
                    result.push({ review, reply })
                }
                return result
            }
            createListElements(data) {
                let results = []

                for (let loop = 0; loop < data.length; loop++) {
                    let review = data[loop].review
                    let reply = data[loop].reply
                    let propsInnerText = "{ "
                    let varsInnerText = (reply)? "{ replyId: `" + reply.id + "` }" : null

                    if (!review.image) { review.image = `./images/generic-avatar.png` }
                    propsInnerText += "reviewId: `" + review.id + "`, "
                    propsInnerText += "imageURL: `" + review.image + "`, "
                    propsInnerText += "firstName: `" + review.name.first + "`, "
                    propsInnerText += "lastName: `" + review.name.last + "`, "
                    propsInnerText += "date: `" + review.date + "`, "
                    propsInnerText += "city: `" + review.city + "`, "
                    propsInnerText += "state: `" + review.state + "`, "
                    propsInnerText += "rating: " + review.stars + ", "
                    propsInnerText += "review: `" + review.review + "`, "
                    propsInnerText += "usefulCount: " + review.usefulCount + ", "
                    propsInnerText += "funnyCount: " + review.funnyCount + ", "
                    propsInnerText += "coolCount: " + review.coolCount + " }"

                    let newInclude = Vanilla.createComponentInclude(`index.html`, `./html/components/reviews/review.html`, `Review`,  `Review-${review.id}`, propsInnerText, varsInnerText)

                    results.push(newInclude)

                    if (!reply) { continue }
                    if (!reply.image) { reply.image = `./images/generic-avatar.png` }

                    propsInnerText = `{`
                    propsInnerText += "reviewId: `" + review.id + "`, "
                    propsInnerText += "replyId: `" + reply.id + "`, "
                    propsInnerText += "imageURL: `" + reply.image + "`, "
                    propsInnerText += "firstName: `" + reply.name.first + "`, "
                    propsInnerText += "lastName: `" + reply.name.last + "`, "
                    propsInnerText += "title: `" + reply.title + "`, "
                    propsInnerText += "date: `" + reply.date + "` }"

                    varsInnerText = reply.reply? "{ reply: `" + reply.reply + "` }" : "{ reply: `` }"
                    console.log(varsInnerText)

                    newInclude = Vanilla.createComponentInclude(`index.html`, `./html/components/reviews/reply.html`, `Reply`,  `Reply-${reply.id}`, propsInnerText, varsInnerText)
                    results.push(newInclude)
                }
                return results
            }
            async buildListElements(newDOMElements) {
                const listRootElement = document.getElementById(this.props.componentObjectId)

                for (const element of newDOMElements) {
                    listRootElement.appendChild(element)
                    await Loader.loadIncludes()
                }
            }
            // fetchURL: `http://127.0.0.1:8080/reviews`
            // fetchURL: `https://vdynode.fly.dev/reviews`
            props = {
                componentObjectId: ``,
                fetchURL: `http://127.0.0.1:8080/reviews`
            }
            vars = {
                reviews: null,
                loadingClass: `flex-row flex-space-between`
            }
        }
    </script>
    <test-script>
    </test-script>
    <style>
    </style>
    <component-markup>
        <article id="{componentObjectId}" class="flex-col bg-white round-15px pad-5">
            <div id="{componentObjectId}-loading" class="{loadingClass}">
                <div id="{componentObjectId}-loading-text">Loading reviews...</div>
                <include-html include-in="review-list.html" src="./html/components/loading.html" component-class="Loading" component-id="{componentObjectId}-loading"></include-html>
            </div>
        </article>
    </component-markup>
</vanilla-component>
