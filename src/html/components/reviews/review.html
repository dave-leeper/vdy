<vanilla-component>
    <script>
        //# sourceURL=html/components/reviews/Review.js
        class Review{
            className() {return this.constructor.name }
            initialize(componentObjectId) { this.props.componentObjectId = componentObjectId }
            beforeMount() { }
            afterMount() { }
            beforeUnmount() { }
            afterUnmount() { }
            getReviewElement() {
                return document.getElementById(`Review${this.props.reviewId}`)
            }
            getReviewObject() {
                return Vanilla.getComponentObject(`Review${this.props.reviewId}`)
            }
            getReplyElement() {
                if (!this.hasReply()) { return null }
                return document.getElementById(`Reply${this.vars.replyId}`)
            }
            hasReply() {
                return !!this.vars.replyId
            }
            async reply() {
                const reviewObject = this.getReviewObject()
                let propsInnerText = "{ reviewId: `" + this.props.reviewId + "`, replyId: `" + this.props.replyId + "` }"

                if (!document.getElementById(`ReplyDialog`)) {
                    let newInclude = Vanilla.createComponentInclude(`index.html`, `./html/components/reviews/reply-dialog.html`, `ReplyDialog`,  `ReplyDialog`, propsInnerText, null)

                    this.getReviewElement().appendChild(newInclude)
                    await Loader.loadIncludes()
                }

                const replyDialog = Vanilla.getComponentObject(`ReplyDialog`)

                replyDialog.show()
            }
            async unmountAndUnregister() {
                const reviewHeaderObj = Vanilla.getComponentObject(`${this.props.componentObjectId}ReviewHeader`)
                const starsObj = Vanilla.getComponentObject(`${this.props.componentObjectId}Stars`)
                const reviewObj = Vanilla.getComponentObject(`${this.props.componentObjectId}Review`)
                const ufcObj = Vanilla.getComponentObject(`${this.props.componentObjectId}UFC`)

                await reviewHeaderObj.unmountAndUnregister()
                await starsObj.unmountAndUnregister()
                await reviewObj.unmountAndUnregister()
                await ufcObj.unmountAndUnregister()
                await VanillaComponentLifecycle.unmount(`${this.props.componentObjectId}`)
                await VanillaComponentLifecycle.unregisterComponentObject(`${this.props.componentObjectId}`)
            }
            props = {
                componentObjectId: ``,
                reviewId: ``,
                imageURL: ``,
                firstName: ``,
                lastName: ``,
                city: ``,
                state: ``,
                starCount: 0,
                review: `Review Text`,
                usefulCount: 0,
                funnyCount: 0,
                coolCount: 0,
            }
            vars = {
                replyId: ``,
            }
        }
    </script>
    <test-script>
    </test-script>
    <style>
    </style>
    <component-markup>
        <section id="{componentObjectId}" class="flex-col bg-white shadow-white margin-tb-10 round-15px pad-5">
            <div>
                <include-html include-in="review.html" src="./html/components/reviews/review-header.html" component-class="ReviewHeader" component-id="{componentObjectId}ReviewHeader">
                    <include-props class="display-none">
                        { 
                            imageURL: `{imageURL}`,
                            firstName: `{firstName}`,
                            lastName: `{lastName}`,
                            city: `{city}`,
                            state: `{state}`,
                            date: `{date}`
                        }          
                    </include-props>
                </include-html>
            </div>
            <section id="{componentObjectId}ReviewBody" class="flex-col w100">
                <include-html include-in="review.html" src="./html/components/reviews/stars.html" component-class="Stars" component-id="{componentObjectId}Stars">
                    <include-props class="display-none">{ editable: false }</include-props>
                    <include-vars class="display-none">{ rating: {rating} }</include-vars>
                </include-html>
                <include-html include-in="review.html" src="./html/components/reviews/show-more-text.html" component-class="ShowMoreText" component-id="{componentObjectId}Review">
                    <include-vars class="display-none">{ text: `{review}` }</include-vars>
                </include-html>
                <include-html include-in="review.html" src="./html/components/reviews/useful-funny-cool.html" component-class="UsefulFunnyCool" component-id="{componentObjectId}UFC">
                    <include-vars class="display-none">{ usefulCount: {usefulCount}, funnyCount: {funnyCount}, coolCount: {coolCount}, replyId: `{replyId}` }</include-vars>
                </include-html>
            </section>
        </section>
    </component-markup>
</vanilla-component>
