<custom-component>
    <script>
        //# sourceURL=html/components/reviews/star.html
        class Stars extends Component {
            setValue(value) { 
                this.vars.value = value
                this.vars.leftColor = "white"
                this.vars.rightColor = "white"
                if ( 0.33 < value) { return }
                this.vars.leftColor = "red"
                if ( 0.66 < value) { return  }
                this.vars.rightColor = "red"
            }
            vars = {
                value: 0,
                leftColor: "white",
                rightColor: "white"
            }
        }
    </script>

    </style>

        <defs>
        <linearGradient id="grad">
            <stop offset="50%" stop-color="{leftColor}"/>
            <stop offset="50%" stop-color="{rightColor}"/>
        </linearGradient>
