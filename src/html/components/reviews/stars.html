<custom-component>
    <script>
        //# sourceURL=html/components/reviews/Stars.html
        class Stars extends Component {
            afterMount() { 
                this.star1 = document.getElementById(`${this.id}Star1`)
                this.star2 = document.getElementById(`${this.id}Star2`)
                this.star3 = document.getElementById(`${this.id}Star3`)
                this.star4 = document.getElementById(`${this.id}Star4`)
                this.star5 = document.getElementById(`${this.id}Star5`)
                this.setStars(this.vars.rating)

                if (this.props.editable) {
                    this.star1.classList.toggle(`cursor-pointer`)
                    this.star2.classList.toggle(`cursor-pointer`)
                    this.star3.classList.toggle(`cursor-pointer`)
                    this.star4.classList.toggle(`cursor-pointer`)
                    this.star5.classList.toggle(`cursor-pointer`)
                } else {
                    this.star1.classList.toggle(`cursor-default`)
                    this.star2.classList.toggle(`cursor-default`)
                    this.star3.classList.toggle(`cursor-default`)
                    this.star4.classList.toggle(`cursor-default`)
                    this.star5.classList.toggle(`cursor-default`)
                }
                super.afterMount()
            }
            setStars(rating) {
                if (1 === this.vars.rating && 1 === rating) {
                    this.vars.rating = 0
                } else {
                    this.vars.rating = rating
                }

                this.star1.innerText = (0 < this.vars.rating)? `★` : `☆`
                this.star2.innerText = (1 < this.vars.rating)? `★` : `☆`
                this.star3.innerText = (2 < this.vars.rating)? `★` : `☆`
                this.star4.innerText = (3 < this.vars.rating)? `★` : `☆`
                this.star5.innerText = (4 < this.vars.rating)? `★` : `☆`

                const newRatingEvent = new CustomEvent(
                    `newRating`,
                    {
                        bubbles: true,
                        detail: {
                            rating: this.vars.rating,
                            component: this, 
                            element: document.getElementById(this.id) 
                        }
                    }
                )
                const element = document.getElementById(this.id)

                element.dispatchEvent(newRatingEvent)
            }
            editStars(rating) {
                if (!this.props.editable) { return }
                this.setStars(rating)
            }
            props = {
                editable: true,
            }
            vars = {
                rating: 0,
            }
        }
    </script>
    <style>
    </style>
    <component-markup>
        <div id="{id}" class="flex-row flex-align-center">
            <div id="{id}Star1" class="red-f margin-1 header-6" onclick="$obj.editStars(1)">☆</div>
            <div id="{id}Star2" class="red-f margin-1 header-6" onclick="$obj.editStars(2)">☆</div>
            <div id="{id}Star3" class="red-f margin-1 header-6" onclick="$obj.editStars(3)">☆</div>
            <div id="{id}Star4" class="red-f margin-1 header-6" onclick="$obj.editStars(4)">☆</div>
            <div id="{id}Star5" class="red-f margin-1 header-6" onclick="$obj.editStars(5)">☆</div>
        </div>
    </component-markup>
    <test-script>
    </test-script>
</custom-component>
