<script src="../../js/test.js"></script>

<vanilla-component>
    <script>
        class TextField{
            className() {return this.constructor.name }
            initialize(componentObjectId) { 
                this.props.componentObjectId = componentObjectId
                this.props.isPassword = `password` === this.vars.type.toLowerCase()
                this.vars.valid = false
            }
            beforeMount() { }
            afterMount() { 
                let wrapper = document.getElementById(`${this.props.componentObjectId}Wrapper`)
                let eyeField = document.getElementById(`${this.props.componentObjectId}Eye`)

                this.vars.element = document.getElementById(this.props.componentObjectId)
                this.vars.errorElement = document.getElementById(`${this.props.componentObjectId}Error`)

                if (this.props.required) { this.vars.element.setAttribute('required', true) } else { this.vars.element.removeAttribute('required') }
                if (this.props.readonly) { this.vars.element.setAttribute('readonly', true) } else { this.vars.element.removeAttribute('readonly') }
                if (this.props.disabled) { this.vars.element.setAttribute('disabled', true) } else { this.vars.element.removeAttribute('disabled') }
                if (this.props.autofocus) { this.vars.element.setAttribute('autofocus', true) } else { this.vars.element.removeAttribute('autofocus') }
                if (this.props.autocomplete) { this.vars.element.setAttribute('autocomplete', true) } else { this.vars.element.removeAttribute('autocomplete') }
                if (this.props.listName) { this.vars.element.setAttribute('list', this.props.listName) } else { this.vars.element.removeAttribute('list') }
                if (this.props.min != Number.MAX_VALUE) { this.vars.element.setAttribute(`min`, this.props.min) }
                if (this.props.max != Number.MIN_VALUE) { this.vars.element.setAttribute(`max`, this.props.max) }
                if (this.props.labelAboveField) { wrapper.setAttribute('class', `flex-col`) } else { wrapper.setAttribute('class', `flex-row`) }
                if (this.props.isPassword) { eyeField.setAttribute('class', `button`) } else { eyeField.setAttribute('class', `display-none`) }
            }
            beforeUnmount() { }
            afterUnmount() { }
            async onFocus(event) {
                this.validate()
                if (this.props.onFocusCallback) { this.props.onFocusCallback(this) }
            }
            async onBlur(event) { 
                while (this.vars.errorElement.firstChild) {
                    this.vars.errorElement.removeChild(this.vars.errorElement.firstChild);
                }
                if (this.props.onBlurCallback) { this.props.onBlurCallback(this) }
            }
            async onInput(event) {
                this.validate()
                if (this.props.onInputCallback) { this.props.onInputCallback(this) }
            }
            async validate() {
                this.vars.valid = false
                while (this.vars.errorElement.firstChild) {
                    this.vars.errorElement.removeChild(this.vars.errorElement.firstChild)
                }
                let testArray = [
                    await test (`Test required`, `Ensure required field has a value.`, [async () => {
                        let results = []

                        if (!this.props.required) { return results }
                        assert(0 < this.vars.element.value?.length,                             `Field '${this.props.name}' is required.`, results, true)
                        return results
                    }]),                    
                    await test (`Test minlength`, `Ensure field is no shorter than ${this.props.minlength}.`, [async () => {
                        let results = []

                        if (!this.props.minlength) { return results }
                        assert(this.props.minlength <= this.vars.element.value?.length,         `Field '${this.props.name}' has at least ${this.props.minlength} characters.`, results, true)
                        return results
                    }]),
                    await test (`Test maxlength`, `Ensure field is no longer than ${this.props.maxlength}.`, [async () => {
                        let results = []

                        if (!this.props.maxlength) { return results }
                        assert(this.props.maxlength >= this.vars.element.value?.length,         `Field '${this.props.name}' has no more than ${this.props.maxlength} characters.`, results, true)
                        return results
                    }]),
                    await test (`Test min`, `Ensure field's value is not less than ${this.props.min}.`, [async () => {
                        let results = []

                        if (Number.MAX_VALUE === this.props.min) { return results }
                        assert(this.props.min <= +this.vars.element.value,                      `Field '${this.props.name}' is not less than ${this.props.min}.`, results, true)
                        return results
                    }]),
                    await test (`Test max`, `Ensure field's value is not more than ${this.props.max}.`, [async () => {
                        let results = []

                        if (Number.MIN_VALUE === this.props.max) { return results }
                        assert(this.props.max >= +this.vars.element.value,                      `Field '${this.props.name}' is not greater than ${this.props.max}.`, results, true)
                        return results
                    }]),
                    await test (`Test pattern`, `Ensure field matches the pattern ${this.props.pattern}.`, [async () => {
                        let results = []

                        if (0 === this.props.pattern.length) { return results }
                        assert(new RegExp(this.props.pattern).test(this.vars.element.value),    `Field '${this.props.name}' matches the pattern ${this.props.pattern}.`, results, true)
                        return results
                    }]),
                    await test (`Test url`, `Ensure field is a valid url.`, [async () => {
                        let results = []
                        const isValidUrl = urlString => {
                            const urlPattern = new RegExp('^(https?:\\/\\/)?'+                  // validate protocol
                            '((([a-z\\d]([a-z\\d-]*[a-z\\d])*)\\.)+[a-z]{2,}|'+                 // validate domain name
                            '((\\d{1,3}\\.){3}\\d{1,3}))'+                                      // validate OR ip (v4) address
                            '(\\:\\d+)?(\\/[-a-z\\d%_.~+]*)*'+                                  // validate port and path
                            '(\\?[;&a-z\\d%_.~+=-]*)?'+                                         // validate query string
                            '(\\#[-a-z\\d_]*)?$','i');                                          // validate fragment locator

                            return !!urlPattern.test(urlString);
                        }

                        if (`url` !== this.vars.type) { return results }
                        assert(isValidUrl(this.vars.element.value),                             `Field '${this.props.name}' is a valid url.`, results, true)
                        return results
                    }]),
                ]

                if (this.vars.customValidationTests && Array.isArray(this.vars.customValidationTests) && 0 < this.vars.customValidationTests.length) {
                    testArray = testArray.concat(this.vars.customValidationTests)
                }

                let results = await suite(`Test field contents oninput`, `Ensure field meets all requirements.`, testArray)
                this.vars.valid = (0 === results.failCount)
                if (this.vars.valid) { 
                    const newTextDataEvent = new CustomEvent(
                        `newTextData`, 
                        { 
                            bubbles: true, 
                            detail: { 
                                text: () => this.vars.value, 
                                component: this, 
                                element: document.getElementById(this.props.componentObjectId) 
                            }
                        }
                    )
                    this.vars.value = this.vars.element.value 
                    this.vars.element.dispatchEvent(newTextDataEvent)
                }
                this.showErrors(results)
            }
            showErrors(suiteResultsTree) {
                for (const test of suiteResultsTree.nodes) {
                    for (const assertion of test.children) {
                        let errorDiv = document.createElement(`div`)
                        let mark = (assertion.passed)? `✓` : `✗`

                        errorDiv.innerText = `${mark} ${assertion.description}`
                        if (assertion.passed) { errorDiv.setAttribute(`class`, `caption-2 success`) }
                        else { errorDiv.setAttribute(`class`, `caption-2 error`) }
                        this.vars.errorElement.appendChild(errorDiv);
                    }
                }
            }
            onShowHideClicked() {
                if (`password` === this.vars.type.toLowerCase()) {
                    this.vars.type = `text`
                    this.vars.imageURL = `../images/eye-open.png`
                } else if (this.props.isPassword) {
                    this.vars.type = `password`
                    this.vars.imageURL = `../images/eye-closed.png`
                }
            }
            async unmountAndUnregister() {
                await VanillaComponentLifecycle.unmount(`${this.props.componentObjectId}`)
                await VanillaComponentLifecycle.unregisterComponentObject(`${this.props.componentObjectId}`)
            }
            props = {
                componentObjectId: ``,
                required: false,
                size: 20,
                minlength: 0,
                maxlength: 50,
                min: Number.MAX_VALUE,
                max: Number.MIN_VALUE,
                pattern: ``,
                label: ``,
                name: ``,
                placeholder: ``,
                readonly: false,
                disabled: false,
                autofocus: false,
                autocomplete: ``,
                list: ``,
                labelAboveField: false,
                isPassword: false,
                tabindex: 0,
            }
            vars = {
                type: `text`, // date, datetime-local, email, month, number, password, tel, text, time, url, week
                imageURL: `../images/eye-closed.png`,
                value: ``,
                element: null,
                customValidationTests: [],
            }
        }
    </script>
    <test-script>
    </test-script>
    <style>
    </style>
    <component-markup>
        <div id="{componentObjectId}Wrapper">
            <label id="{componentObjectId}Label" for="{name}" class="text-field-label">{label}</label>
            <div>
                <div class="flex-row">
                    <input 
                        id="{componentObjectId}" 
                        class="text-field"
                        type="{type}" 
                        name="{name}"
                        size="{size}"
                        minlength="{minlength}"
                        maxlength="{maxlength}"
                        value="{value}"
                        placeholder="{placeholder}"
                        list="{list}"
                        onfocus="$obj.onFocus(event)"
                        onblur="$obj.onBlur(event)"
                        oninput="$obj.onInput(event)"
                        tabindex="{tabindex}"
                    >
                    <img id="{componentObjectId}Eye" src="{imageURL}" width="25" onclick="$obj.onShowHideClicked()" loading="lazy">
                </div>
                <div id="{componentObjectId}Error"></div>
            </div>
        </div>
    </component-markup>
</vanilla-component>
