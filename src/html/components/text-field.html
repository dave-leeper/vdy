<vanilla-component>
    <script>
        class TextField{
            className() {return this.constructor.name }
            initialize(componentObjectId) { this.props.componentObjectId = componentObjectId }
            beforeMount() { }
            afterMount() { 
                const element = document.getElementById(this.componentObjectId)

                element.required = !!this.props.required
                element.readonly = !!this.props.readonly
                element.disabled = !!this.props.disabled
                element.autofocus = !!this.props.autofocus
                element.autocomplete = !!this.props.autocomplete
                if (this.props.min != Number.MAX_VALUE) { element.setAttribute(`min`, this.props.min) }
                if (this.props.max != Number.MIN_VALUE) { element.setAttribute(`max`, this.props.max) }
            }
            beforeUnmount() { }
            afterUnmount() { }
            onFocus() { }
            onBlur() { }
            onInput() { }
            props = {
                componentObjectId: ``,
                required: false,
                size: 20,
                minlength: 0,
                maxlength: 50,
                min: Number.MAX_VALUE,
                max: Number.MIN_VALUE,
                pattern: ``,
                label: ``,
                name: ``,
                placeholder: ``,
                readonly: false,
                disabled: false,
                autofocus: false,
                autocomplete: ``,
                list: ``,
                labelAboveField: false,
                requiredErrorMessage: ``,
                minLengthErrorMessage: ``,
                maxLengthErrorMessage: ``,
                minErrorMessage: ``,
                maxErrorMessage: ``,
                patternErrorMessage: ``,
            }
            vars = {
                type: `text`, // date, datetime-local, email, month, number, password, tel, text, time, url, week
                value: ``,
            }
        }
    </script>
    <test-script>
    </test-script>
    <style>
    </style>
    <component-markup>
        <div>
            <label id="{componentObjectId}-label" for="{name}">{label}</label>
            <div>
                <input 
                    id="{componentObjectId}" 
                    type="{type}" 
                    name="{name}"
                    size="{size}"
                    minlength="{minlength}"
                    maxlength="{maxlength}"
                    value="{value}"
                    placeholder="{placeholder}"
                    list="{list}"
                    onfocus="$obj.onFocus()"
                    onblur="$obj.onBlur()"
                    oninput="$obj.onInput()"
                >
                <div id="{componentObjectId}-error"></div>
            </div>
        </div>
    </component-markup>
</vanilla-component>
