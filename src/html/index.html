<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Vanilla HTML framework reference">
    <meta name="keywords" content="HTML, CSS, JavaScript, Vanilla">
    <meta name="author" content="Dave Leeper">
    <!-- https://ogp.me -->
    <meta property="og:title" content="Vince Drives You" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.imdb.com/title/tt0117500/" />

    <title>Vince Drives You</title>
    <script type="text/javascript" src="./js/include.js"></script>
    <script type="text/javascript" src="./js/purify.min.js"></script>
    <link rel="stylesheet" href="./css/styles.css">
    <script>
      function setCSSDefaults() {
        const r = document.querySelector(':root')
        var rs = getComputedStyle(r);
        const blue50 = rs.getPropertyValue('--blue-50')
        const black = rs.getPropertyValue('--black')
        r.style.setProperty('--button-color', black);
        r.style.setProperty('--button-background-color', blue50);
        r.style.setProperty('--button-border-color', blue50);
      }
      setCSSDefaults()
    </script>
  </head>
  <body class="margin-5 bg-grey-e">
    <div class="h300px margin-b-50">
      <include-html include-in="index.html" src="./html/components/slideshow.html" component-class="Slideshow" component-id="Slideshow1"></include-html>
    </div>
    <div class="w33">
      <include-html include-in="index.html" src="./html/components/reviews/review-list.html" component-class="ReviewList" component-id="ReviewList1"></include-html>
    </div>
  </body>
</html>
