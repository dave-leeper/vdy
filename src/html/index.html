<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Vince Drives You</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Vince Drives You">
    <meta name="keywords" content="Ride, Taxi, Airport">
    <meta name="author" content="Dave Leeper">
    <!-- https://ogp.me -->
    <meta property="og:title" content="Vince Drives You" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.imdb.com/title/tt0117500/" />
    <meta property="og:image" content="https://ia.media-imdb.com/images/rock.jpg" />
    <script type="text/javascript" src="./js/messages.js"></script>
    <script type="text/javascript" src="./js/queue.js"></script>
    <script type="text/javascript" src="./js/include.js"></script>
    <script type="text/javascript" src="./js/registry-client-side.js"></script>
    <script type="text/javascript" src="./js/test.js"></script>
    <script type="text/javascript" src="./js/purify.min.js"></script>
    <link rel="stylesheet" href="./css/styles.css">
    <script>
      function initializeApp() {
        const params = new URLSearchParams(window.location.search)
        const token = params.get(`token`)

        JavascriptWebToken.storeCredentials(JSON.parse(token))
      }
      function setCSSDefaults() {
        const r = document.querySelector(':root')
        var rs = getComputedStyle(r);
        const blue50 = rs.getPropertyValue('--blue-50')
        const black = rs.getPropertyValue('--black')
        r.style.setProperty('--button-color', black);
        r.style.setProperty('--button-background-color', blue50);
        r.style.setProperty('--button-border-color', blue50);
      }
      initializeApp()
      setCSSDefaults()
    </script>
  </head>
  <body class="margin-5 bg-grey-e" onload="initializeApp()">
    <include-html include-in="index.html" src="./html/components/snackbar.html" component-class="Snackbar" component-id="SnackbarError">
      <include-props class="display-none">{ isError: true }</include-props>
      <include-vars class="display-none">{ text: `Message.` }</include-vars>
    </include-html>
    <include-html include-in="index.html" src="./html/components/snackbar.html" component-class="Snackbar" component-id="SnackbarInfo">
      <include-vars class="display-none">{ text: `Message.` }</include-vars>
    </include-html>
    <div class="h300px margin-b-50">
      <include-html include-in="index.html" src="./html/components/slideshow.html" component-class="Slideshow" component-id="Slideshow"></include-html>
      <div class="w100 h20px"></div>
    </div>
    <div class="w33">
      <include-html include-in="index.html" src="./html/components/reviews/write-review-button.html" component-class="WriteReviewButton" component-id="WriteReviewButton"></include-html>
      <include-html include-in="index.html" src="./html/components/component-slot-test.html" component-class="ComponentSlotTest" component-id="ComponentSlotTest"></include-html>
      <div class="w100 h20px"></div>
      <include-html include-in="index.html" src="./html/components/reviews/review-list.html" component-class="ReviewList" component-id="ReviewList"></include-html>
    </div>
    <slot-markup for-component-id="ComponentSlotTest" for-slot="ComponentSlotTestSlot1">
      <div id="SlotContent">SLOT CONTENT</div>
    </slot-markup>
  </body>
</html>
