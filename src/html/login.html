<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Vince Drives You</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Vince Drives You">
    <meta name="keywords" content="Ride, Taxi, Airport">
    <meta name="author" content="Dave Leeper">
    <!-- https://ogp.me -->
    <meta property="og:title" content="Vince Drives You" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.imdb.com/title/tt0117500/" />
    <meta property="og:image" content="https://ia.media-imdb.com/images/rock.jpg" />
    <script type="text/javascript" src="./js/include.js"></script>
    <script type="text/javascript" src="./js/test.js"></script>
    <script type="text/javascript" src="./js/purify.min.js"></script>
    <link rel="stylesheet" href="./css/styles.css">
    <script>
      function setCSSDefaults() {
        const r = document.querySelector(':root')
        var rs = getComputedStyle(r);
        const blue50 = rs.getPropertyValue('--blue-50')
        const black = rs.getPropertyValue('--black')
        r.style.setProperty('--button-color', black);
        r.style.setProperty('--button-background-color', blue50);
        r.style.setProperty('--button-border-color', blue50);
      }
      setCSSDefaults()
      async function login() {
        const response = await fetch(`http://127.0.0.1:8080/login`, {
          method: 'POST', 
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({name: "Admin", "password": "Admin"})
        });
        console.log(response)
      }
    </script>
  </head>
  <body class="flex-col margin-5 bg-grey-e">
    <include-html include-in="index.html" src="./html/components/text-field.html" component-class="TextField" component-id="User">
        <include-props class="display-none">{ placeholder: `User`, name: `UserField`, label: `User`, required: true, autofocus: true,autocomplete: true, minlength: 2 }</include-props>
        <include-vars class="display-none">{ type: `text` } </include-vars>
      </include-html>
      <include-html include-in="index.html" src="./html/components/text-field.html" component-class="TextField" component-id="Password">
        <include-props class="display-none">{ name: `PasswordField`, label: `Password`, required: true, autofocus: true, minlength: 2 }</include-props>
        <include-vars class="display-none">{ type: `password` }
        </include-vars>
      </include-html>
      </body>
</html>
